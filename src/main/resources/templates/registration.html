<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Registration Form</title>
<link rel="stylesheet" th:href="@{/CSS/registration.css}">
</head>
<body>

	<div class="main-container">
		<form action="#" th:action="@{/registration}" method="POST" th:object="${registrationDetail}">
			<table class="container-table">
				<tr>
					<td class="first-title" > Register to CyPeople </td>
				</tr>
				<tr>
					<td class="second-title" > Register your CyPeople Account </td>
				</tr>
				<tr>
					<td th:if="${session.message}">
						<label class="message" th:text="${session.message.content}"></label>
						<!-- <th:block th:text="${#session.removeAttribute('message')}"></th:block> -->
					</td>
				</tr>
				<tr>
					<td>
						<label for ="name"> Your Name </label>
						<input
							type="text" id="name" name="name" placeholder="Enter Your Name"
							required="required">
					</td>
				</tr>
				<tr>
					<td>
						<label for="role"> Role </label>
						<select id="role" name="role" required="required">
							<option value=""> Select Role </option>
							<option value="ROLE_EMPLOYEE"> Employee </option>
							<option value="ROLE_MANAGER"> Manager </option>
							<option value="ROLE_ADMIN"> Admin </option>
						</select>
					</td>
				</tr>
				<tr>
					<td>
						<label for="email"> Email </label>
						<input id="email" type="email" name="email" placeholder="Email" required="required">
					</td>
				</tr>
				<tr>
					<td>
						<label for="password"> Password </label>
						<input id="password" type="password" name="password" placeholder="Password" required="required">
					</td>
				</tr>
				<tr>
					<td>
						<button class="reset-button" type="reset"> Reset </button>
						<button class="submit-button" type="submit"> Submit </button>
					</td>
				</tr>
				<tr>
					<td>
						<a th:href="@{/login}"> Back Login </a>
					</td>
				</tr>

				
			</table>
		</form>
	</div>
</body>
</html>
