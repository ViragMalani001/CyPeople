<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title> Clients List </title>
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
	<link rel="stylesheet" type="text/css" th:href="@{/CSS/clients/clients-list.css}" />
</head>
<body> 
   <div id="clients"></div>
   
   <div class="client-list">
   		  <div class="client-header">
	   		<label>Client List</label>
	   	</div>
	   	<div class="client-table-div">
	   		<table class="client-table">
	   			<tr>
	   				<th> Client Name </th>
	   				<th> Company Name </th>
	   				<th> Client Id </th>
	   				<th> Email Id </th>
	   				<th> Mobile No. </th>
	   				<th sec:authorize="hasAnyRole('MANAGER', 'ADMIN')"> Action </th>
 	   			</tr>
			  	 	<tr th:each="client : ${clients}">
		            <td th:text="${client.clientName}"></td>
		            <td th:text="${client.companyName}"></td>
		            <td th:text="${client.clientId}"></td>
		            <td th:text="${client.email}"></td>
		            <td th:text="${client.mobileNo}"></td>
		            
					<td sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">
						<div class="edit">
							<a th:href="@{/clients-update(clientId=${client.id})}">
									<i class="material-icons">edit</i>
							</a>
						</div>
						<div class="detele">
							<a th:href="@{/clients-delete(clientId=${client.id})}"
								onclick="if (!(confirm('Are you sure you want to delete this employee?'))) return false">
								<i class="material-icons">delete_forever</i>
							</a>
						</div>
					</td>
		        </tr>
	   		</table>
	   	</div>
   </div>
    <script>
	      $(function() {
	         $("#clients").load("http://localhost:8080/clients");
	      });
	</script>
</body>
</html>
