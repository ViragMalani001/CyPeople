<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="emp-list">
<head>
<meta charset="UTF-8" />
<title>All Employees</title>

<link rel="stylesheet" type="text/css"
	th:href="@{/CSS/employees/emp-list.css}" />
<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
	rel="stylesheet">
	
	<script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
</head>
<body>
	
	<div th:replace="/employees/employees :: employees"></div>
	<div class="emp-list">
		<div class="emp-header">
			<label> Employees List </label> <a href="/emp-add"> Add Employee
			</a>
		</div>
		<div class="emp-table-div">
			<table class="emp-table">
				<tr>
					<th>Name</th>
					<th>Employee Id</th>
					<th>Email</th>
					<th>Phone</th>
					<th>Join Date</th>
					<th>Role</th>
					<th>Action</th>
				</tr>
				<tr th:each="employee : ${employeesList}">
					<td th:text="${employee.name}"></td>
					<td th:text="${employee.employeeId}"></td>
					<td th:text="${employee.email}"></td>
					<td th:text="${employee.phone}"></td>
					<td th:text="${#dates.format(employee.joinDate, 'dd-MM-yyyy')}"></td>
					<td th:text="${employee.role}"></td>
					<td>
						<div class="edit">
							<a th:href="@{/emp-update(employeeId=${employee.id})}"> <i
								class="material-icons">edit</i>
							</a>
						</div>

						<div sec:authorize="hasAnyRole('MANAGER', 'ADMIN')" class="detele">
							<div class="visibility">
								<a th:href="@{/emp-detail}"> <i class="material-icons">visibility</i>
								</a>
							</div>
							<div class="delete">
								<a th:href="@{/emp-delete(employeeId=${employee.id})}"
									onclick="if (!(confirm('Are you sure you want to delete this employee?'))) return false">
									<i class="material-icons">delete_forever</i>
								</a>
							</div>
						</div>
					</td>
				</tr>
			</table>
		</div>
	</div>
	
</body>
</html>
