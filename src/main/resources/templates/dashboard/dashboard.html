<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Dashboard</title>

<link rel="stylesheet" type="text/css"
	th:href="@{/CSS/dashboard/dashboard.css}" />
<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
	rel="stylesheet">

<!-- <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script> -->
<script
    src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<!-- <link rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"> -->
<script type="text/javascript"
    src="https://www.gstatic.com/charts/loader.js"></script>

</head>
<body>
	<div id="manubar"></div>

	<div class="dashboard-container">
		<div class="dashboard-header">
			<label> Dashboard </label>
		</div>

		<div class="emp-list-count">
			<div class="total-emp">
				<div class="emp-png">
					<i class="material-icons" style="font-size: 36px">people</i>
				</div>
				<div class="emp-count">
					<label> Total Employee </label> <label th:text="${employeeCount}"></label>
				</div>
			</div>

			<div class="total-department">
				<div class="department-png">
					<i class="material-icons" style="font-size: 36px">collections_bookmark</i>
				</div>
				<div class="department-count">
					<label> Total Department </label> <label
						th:text="${departmentCount}"></label>
				</div>
			</div>

			<div class="total-client">
				<div class="client-png">
					<i class="material-icons" style="font-size: 36px">person_add </i>
				</div>
				<div class="client-count">
					<label> Total client </label> <label th:text="${clientCount}"></label>
				</div>
			</div>

			<div class="total-project">
				<div class="project-png">
					<i class="material-icons" style="font-size: 36px">add_to_photos</i>
				</div>
				<div class="project-count">
					<label> Total projects </label> <label th:text="${projectCount}"></label>
				</div>
			</div>

			<div class="total-leaveRequest">
				<div class="leaveRequest-png">
					<i class="material-icons" style="font-size: 36px">event_available</i>
				</div>
				<div class="leaveRequest-count">
					<label> Total leaveRequest </label> <label
						th:text="${leaveRequestCount}"></label>
				</div>
			</div>

		</div>
        <div id="chart_div"></div>
        <div id="piechart">
	</div>

<script th:inline="javascript">
        var real_data = /*[[${chartData}]]*/'noValue';
        $(document).ready(function() {
            google.charts.load('current', {
                packages : [ 'corechart', 'bar' ]
            });
            google.charts.setOnLoadCallback(drawColumnChart);
            google.charts.setOnLoadCallback(drawPieChart);
        });
        function drawColumnChart() {
            var data = new google.visualization.DataTable();
            data.addColumn('string', 'Year');
            data.addColumn('number', 'Views');
            Object.keys(real_data).forEach(function(key) {
                data.addRow([ key, real_data[key] ]);
            });
            var options = {
                title : 'Blog stats',
                hAxis : {
                    title : 'Years',
                },
                vAxis : {
                    title : 'View Count'
                }
            };
            var chart = new google.visualization.ColumnChart(document
                    .getElementById('chart_div'));
            chart.draw(data, options);
        }
        function drawPieChart() {
            var data = new google.visualization.DataTable();
            data.addColumn('string', 'Year');
            data.addColumn('number', 'Views');
            Object.keys(real_data).forEach(function(key) {
                data.addRow([ key, real_data[key] ]);
            });
            var options = {
                title : 'Blog stats'
            };
            var chart = new google.visualization.PieChart(document
                    .getElementById('piechart'));
            chart.draw(data, options);
        }
    </script>
