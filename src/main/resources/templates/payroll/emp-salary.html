<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title> Salary Page </title>
	    <link rel="stylesheet" type="text/css" th:href="@{/CSS/payroll/emp-salary.css}" />
      <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
</head>
<body>
	<div id="payroll"></div>
	
	<div class="emp-salary">
		<div class="emp-salary-header">
			<label> Employee Salary </label>		
		</div>
		<div class="emp-salary-table">
			<table>
		   			<tr>
		   				<th> Name </th>
		   				<th> Employee Id </th>
		   				<th> Phone </th>
		   				<th> Join Date </th>
		   				<th> Role </th>
		   				<th> Action </th>
	 	   			</tr>
	 	   			<tr th:each="employeeList : ${employeeList}">
			            <td th:text="${employeeList.name}"></td>
			            <td th:text="${employeeList.employeeId}"></td>
			            <td th:text="${employeeList.phone}"></td>
			            <td th:text="${#dates.format(employeeList.joinDate, 'dd-MM-yyyy')}"></td>
			            <td th:text="${employeeList.role}"></td>
						<td> 
							<a th:href="@{/generatePaySlipe(employeeId=${employeeList.id})}" target="blank"> Generate Slip </a> 
						</td>
			        </tr>
			</table>
		</div>
	</div>
	
	<script type="text/javascript">
		$(function(){
			$("#payroll").load("http://localhost:8080/payroll");
		});
	</script>
</body>
</html>
