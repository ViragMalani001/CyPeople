<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Dashboard</title>

<link rel="stylesheet" type="text/css"
	th:href="@{/CSS/dashboard/dashboard.css}" />


<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
	rel="stylesheet">

<script
	src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>

</head>
<body>
   <div id="manubar"></div>
   
	<div class="dashboard-container">
		<div class="dashboard-header">
			<label> Dashboard </label>
		</div>

		<div class="emp-list-count">
			<div class="total-emp">
				<div class="emp-png">
					<i class="material-icons" style="font-size: 36px">people</i>
				</div>
				<div class="emp-count">
					<label> Total Employee </label> <label th:text="${employeeCount}"></label>
				</div>
			</div>

			<div class="total-department">
				<div class="department-png">
					<i class="material-icons" style="font-size: 36px">collections_bookmark</i>
				</div>
				<div class="department-count">
					<label> Total Department </label> <label
						th:text="${departmentCount}"></label>
				</div>
			</div>

			<div class="total-client">
				<div class="client-png">
					<i class="material-icons" style="font-size: 36px">person_add </i>
				</div>
				<div class="client-count">
					<label> Total client </label> <label th:text="${clientCount}"></label>
				</div>
			</div>

			<div class="total-project">
				<div class="project-png">
					<i class="material-icons" style="font-size: 36px">add_to_photos</i>
				</div>
				<div class="project-count">
					<label> Total projects </label> <label th:text="${projectCount}"></label>
				</div>
			</div>

			<div class="total-leaveRequest">
				<div class="leaveRequest-png">
					<i class="material-icons" style="font-size: 36px">event_available</i>
				</div>
				<div class="leaveRequest-count">
					<label> Total leaveRequest </label> <label
						th:text="${leaveRequestCount}"></label>
				</div>
			</div>

		</div>
		<div id="container"></div>
		<div id="container2"></div>
	</div>


	<script th:inline="javascript">
		$(function() {
			Highcharts
					.chart(
							'container',
							{
								chart : {
									type : 'column'
								},
								title : {
									text : 'Technology Popularity In India'
								},
								subtitle : {
									text : 'All Details is not true its a dummy Map'
								},
								xAxis : {
									categories : [ [ $surveyMap.keySet() ] ],
									crosshair : true
								},
								yAxis : {
									min : 0,
									max : 100,
									title : {
										text : 'Technology rating [in %]'
									}
								},
								tooltip : {
									headerFormat : '<span style="font-size:10px">{point.key}</span><table>',
									pointFormat : '<tr><td style="color:{series.color};padding:0">{series.name}: </td>'
											+ '<td style="padding:0"><b>{point.y:.1f} K</b></td></tr>',
									footerFormat : '</table>',
									shared : true,
									useHTML : true
								},
								plotOptions : {
									column : {
										pointPadding : 0.2,
										borderWidth : 0
									}
								},
								series : [ {
									name : 'Technology',
									data : [ [ $surveyMap.values() ] ]
								} ]
							});
		});
	</script>
	<script th:inline="javascript">
		Highcharts.chart('container2', {
			chart : {
				type : 'pie',
				options3d : {
					enabled : true,
					alpha : 50,
					beta : 0
				}
			},
			title : {
				text : 'Result Status'
			},
			tooltip : {
				pointFormat : '{series.name}: <b>{point.percentage:.1f}%</b>'
			},
			plotOptions : {
				pie : {
					allowPointSelect : true,
					cursor : 'pointer',
					depth : 35,
					dataLabels : {
						enabled : true,
						format : '{point.name}'
					}
				}
			},
			series : [ {
				type : 'pie',
				name : 'Ratio',
				data : [ [ 'Success', [ [ $pass ] ] ],
						[ 'Failure', [ [ $fail ] ] ] ]
			} ]
		});
	</script>

   
    <script>
	      $(function() {
	         $("#manubar").load("http://localhost:8080/manubar");
	      });
	</script>
</body>
</html>
