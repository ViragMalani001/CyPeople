<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Leave Requests</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
	rel="stylesheet">
<script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
<link rel="stylesheet" type="text/css"
	th:href="@{/CSS/employees/emp-leave.css}" />
</head>
<body>
<div th:replace="/employees/employees :: employees"></div>
	<div class="emp-list">
		<div class="emp-header">
			<label>Employees Leave List</label> <a href="/emp-leave-add"> Add
				Leave Request </a>
		</div>
		<div class="emp-table-div">
			<table class="emp-table" >
				<tr>
					<th>Name</th>
					<th>Employee Id</th>
					<th>StartDate</th>
					<th>EndDate</th>
					<th>Reason</th>
					<th sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">Action</th>
					<th>Action Result</th>
				</tr>
				<tr th:each="employee : ${employees}" >
					<td th:text="${employee.name}"></td>
					<td th:text="${employee.employeeId}"></td>
					<td th:text="${#dates.format(employee.startDate, 'dd-MM-yyyy')}"></td>
					<td th:text="${#dates.format(employee.endDate, 'dd-MM-yyyy')}"></td>
					<td th:text="${employee.reason}"></td>
					<td sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">
						<div class="action">
							<a th:href="@{/emp-leave-delete(employeeId=${employee.id})}"
								onclick="return confirm('Are you sure want to delete this entry ?')">
								<i class="material-icons">delete</i>
							</a>
							<form class="done" th:action="@{/approve}" method="post">
								<input type="hidden" name="employeeId" th:value="${employee.id}" />
								<button type="submit"
									onclick="return confirm('Are you sure you want to approve this request?')">
									<i class="material-icons">done</i>
								</button>
							</form>
							<form class="clear" th:action="@{/reject}" method="post">
								<input type="hidden" name="employeeId" th:value="${employee.id}" />
								<button type="submit"
									onclick="return confirm('Are you sure you want to reject this request?')">
									<i class="material-icons">clear</i>
								</button>
							</form>

						</div>
					</td>
					<td class="action-result" th:text="${employee.approvalStatus}"></td>
				</tr>
			</table>
		</div>
	</div>
</body>
</html>
